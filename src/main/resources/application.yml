spring:
  application:
    name: fuel-station

  # ── Banco de Dados H2 em modo arquivo (persistência entre restarts) ──────────
  datasource:
    url: jdbc:h2:file:./data/fuelstation;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  # ── JPA / Hibernate ──────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate          # Flyway gerencia o schema; Hibernate apenas valida
    show-sql: false
    open-in-view: false           # Boa prática: desabilitar OSIV para evitar N+1 lazy
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  # ── Flyway: Migrations ────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── Console H2 (apenas dev) ───────────────────────────────────────────────────
  h2:
    console:
      enabled: true
      path: /h2-console

# ── Servidor ─────────────────────────────────────────────────────────────────────
server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

# ── Actuator ──────────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

# ── Informações da aplicação (exibidas pelo /actuator/info) ──────────────────────
info:
  app:
    name: Fuel Station API
    description: API para gestão de abastecimentos em posto de combustível
    version: "@project.version@"

# ── SpringDoc / Swagger UI ────────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

# ── Logging ───────────────────────────────────────────────────────────────────────
logging:
  level:
    com.fuelstation: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
